<!DOCTYPE html>
<html>
<head>
  <title>SHL Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
    }

    #chat-container {
      width: 420px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: 600px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    #header {
      padding: 15px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      margin: 10px 0;
      max-width: 75%;
      padding: 10px;
      border-radius: 10px;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e4e6eb;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 16px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      padding: 8px;
      margin-top: 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div id="chat-container">
  <div id="header">SHL Assessment Chatbot</div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="input" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
let messages = [];

async function send() {
  const inputBox = document.getElementById("input");
  const text = inputBox.value;

  if (!text) return;

  messages.push({ role: "user", content: text });

  addMessage("user", text);

  inputBox.value = "";

  const response = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ messages: messages })
  });

  const data = await response.json();

  addMessage("bot", data.reply);

  // Show recommendations nicely
  if (data.recommendations.length > 0) {
    data.recommendations.forEach(item => {
      addCard(item.name, item.url);
    });
  }

  messages.push({ role: "assistant", content: data.reply });

  scrollToBottom();
}

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "message " + role;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}

function addCard(name, url) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<b>${name}</b><br><a href="${url}" target="_blank">View Test</a>`;
  document.getElementById("messages").appendChild(div);
}

function scrollToBottom() {
  const messagesDiv = document.getElementById("messages");
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>

</body>
</html>
